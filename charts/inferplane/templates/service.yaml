apiVersion: v1
kind: Service
metadata:
  name: {{ include "inferplane.fullname" . }}
  labels:
    {{- include "inferplane.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "inferplane.selectorLabels" . | nindent 4 }}
  ports:
    - name: data
      port: {{ .Values.service.dataPort }}
      targetPort: data
      protocol: TCP
    - name: admin
      port: {{ .Values.service.adminPort }}
      targetPort: admin
      protocol: TCP
