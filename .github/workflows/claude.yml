name: Claude Code

# Responds when someone types "@claude" in an issue, PR comment, PR review, or a
# new/assigned issue. Runs Claude on Amazon Bedrock via GitHub OIDC (no API key).
# Prereqs: AWS OIDC provider + IAM role (secret AWS_ROLE_TO_ASSUME) with
# bedrock:InvokeModel, and Bedrock model access enabled. See
# docs/runbooks/claude-code-action.md.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only run when @claude is actually mentioned — bounds Bedrock spend.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the reply
      issues: write
      id-token: write # GitHub OIDC → assume the AWS role
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC → Bedrock)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Run Claude Code (Bedrock)
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          # Restrict tools: this is a PUBLIC repo and anyone can type "@claude",
          # so the responder is scoped to read + comment (no arbitrary Bash/Edit/
          # Write). Add Edit/Write + contents:write only if you want @claude to
          # make code changes.
          claude_args: |
            --model ${{ vars.CLAUDE_BEDROCK_MODEL || 'us.anthropic.claude-sonnet-4-6' }}
            --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh search:*),Read"
