name: Claude Code

# Responds when an AUTHORIZED user (owner/member/collaborator) types "@claude" in
# an issue, PR comment, PR review, or a new issue. Runs on Amazon Bedrock via
# GitHub OIDC (no API key). Prereqs: AWS OIDC provider + IAM role
# (secret AWS_ROLE_TO_ASSUME) with bedrock:InvokeModel, and Bedrock model access
# enabled. See docs/runbooks/claude-code-action.md.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Gate on BOTH an @claude mention AND author_association ∈ {OWNER,MEMBER,
    # COLLABORATOR}. Without the association check, ANY GitHub user could type
    # "@claude" on this PUBLIC repo and trigger a Bedrock InvokeModel against our
    # AWS account (cost/abuse). author_association lives on different payload
    # paths per event, hence the per-event branches.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # gh pr comment
      issues: write # gh issue comment
      id-token: write # GitHub OIDC → assume the AWS role
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC → Bedrock)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Run Claude Code (Bedrock)
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          # Single-line (no multiline block) so arg tokenization is unambiguous.
          # Read + comment only — no arbitrary Bash/Edit/Write on this public-repo
          # responder. Both --allowed-tools and --allowedTools are accepted by the CLI.
          claude_args: '--model ${{ vars.CLAUDE_BEDROCK_MODEL || ''us.anthropic.claude-sonnet-4-6'' }} --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh search:*),Read"'
