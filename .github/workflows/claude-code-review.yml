name: Claude Code Review

# Automatically reviews every PR (open + new commits) using Claude on Amazon
# Bedrock via GitHub OIDC (no API key). Fork PRs do NOT receive an OIDC token,
# so they are skipped by the `if:` guard (no secret/credential exposure on this
# public repo, and no failed red check either).
# Prereqs: AWS OIDC provider + IAM role (secret AWS_ROLE_TO_ASSUME) with
# bedrock:InvokeModel, and Bedrock model access enabled. See
# docs/runbooks/claude-code-action.md.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    # Skip fork PRs: they get no OIDC token, so the AWS step would error (red check).
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the review as a PR comment
      id-token: write # GitHub OIDC → assume the AWS role
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC → Bedrock)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Automatic PR review (Bedrock)
        uses: anthropics/claude-code-action@fad22eb3fa582b7357fc0ea48af6645851b884fd # v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          # claude-code-action blocks bot-authored triggers by default ("Workflow
          # initiated by non-human actor"). Dependabot version-bump PRs only touch
          # action/module pins — low risk — and should get the same review as any
          # human PR, so it's explicitly allowed here.
          allowed_bots: "dependabot[bot]"
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.
            Be a rigorous but constructive reviewer. Prioritize:
            - Correctness and bugs
            - Security and the project's NON-NEGOTIABLE invariants in CLAUDE.md:
              data-free admin console (no client-side secret/data persistence),
              secret-ref mandate (no inline secrets), integer microUSD (never float),
              count_tokens must never return non-200, zero-core-diff provider isolation,
              and /metrics carrying no secret or key_id.
            - Test coverage and missing edge cases
            Post findings with `gh pr comment` (severity-tagged). Review only what the
            diff changes; do not request unrelated refactors.
          # Single-line claude_args: unambiguous tokenization; read + comment only.
          claude_args: '--model ${{ vars.CLAUDE_BEDROCK_MODEL || ''us.anthropic.claude-sonnet-4-6'' }} --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh search:*),Bash(gh issue view:*)"'
