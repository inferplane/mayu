name: Claude Code Review

# Automatically reviews every PR (open + new commits) using Claude on Amazon
# Bedrock via GitHub OIDC (no API key). Fork PRs do NOT receive an OIDC token,
# so they are skipped by the `if:` guard (no secret/credential exposure on this
# public repo, and no failed red check either).
# Prereqs: AWS OIDC provider + IAM role (secret AWS_ROLE_TO_ASSUME) with
# bedrock:InvokeModel, and Bedrock model access enabled. See
# docs/runbooks/claude-code-action.md.
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    # Skip fork PRs: they get no OIDC token, so the AWS step would error (red check).
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # post the review as a PR comment
      id-token: write # GitHub OIDC → assume the AWS role
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Configure AWS credentials (OIDC → Bedrock)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: Automatic PR review (Bedrock)
        id: claude-review
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1
        with:
          use_bedrock: "true"
          github_token: ${{ github.token }}
          # claude-code-action blocks bot-authored triggers by default ("Workflow
          # initiated by non-human actor"). Dependabot version-bump PRs only touch
          # action/module pins — low risk — and should get the same review as any
          # human PR, so it's explicitly allowed here.
          allowed_bots: "dependabot[bot]"
          prompt: |
            Review pull request #${{ github.event.pull_request.number }}.
            Be a rigorous but constructive reviewer. Prioritize:
            - Correctness and bugs
            - Security and the project's NON-NEGOTIABLE invariants in CLAUDE.md:
              data-free admin console (no client-side secret/data persistence),
              secret-ref mandate (no inline secrets), integer microUSD (never float),
              count_tokens must never return non-200, zero-core-diff provider isolation,
              and /metrics carrying no secret or key_id.
            - Test coverage and missing edge cases
            Post findings with `gh pr comment` (severity-tagged: CRITICAL/HIGH/MEDIUM/LOW).
            Review only what the diff changes; do not request unrelated refactors.
            After posting the comment, you MUST also return your final answer as the
            required structured JSON output: max_severity is the single highest
            severity among all findings you reported ("NONE" if you found nothing to
            flag), and verdict is "block" if max_severity is HIGH or CRITICAL, else
            "approve". Be conservative: if genuinely unsure whether something is HIGH
            vs MEDIUM, round UP — a false "block" costs a human look; a false "approve"
            ships a real bug.
          # Single-line claude_args: unambiguous tokenization; read + comment only.
          # --json-schema forces the structured max_severity/verdict output the next
          # step gates on (see "Enforce no CRITICAL/HIGH findings" below) — this is
          # what turns the review from advisory-only into an actual merge gate once
          # this check is marked required in branch protection.
          claude_args: '--model ${{ vars.CLAUDE_BEDROCK_MODEL || ''us.anthropic.claude-fable-5'' }} --allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(gh search:*),Bash(gh issue view:*)" --json-schema "{\"type\":\"object\",\"required\":[\"max_severity\",\"verdict\"],\"properties\":{\"max_severity\":{\"type\":\"string\",\"enum\":[\"NONE\",\"LOW\",\"MEDIUM\",\"HIGH\",\"CRITICAL\"]},\"verdict\":{\"type\":\"string\",\"enum\":[\"approve\",\"block\"]},\"summary\":{\"type\":\"string\"}}}"'

      - name: Enforce no CRITICAL/HIGH findings
        if: always()
        env:
          REVIEW_JSON: ${{ steps.claude-review.outputs.structured_output }}
          REVIEW_OUTCOME: ${{ steps.claude-review.outcome }}
        run: |
          # Fail closed: if the review step itself didn't succeed, or produced
          # no structured verdict, that is NOT a clean bill of health — do not
          # let a broken/missing review silently pass this gate.
          if [ "$REVIEW_OUTCOME" != "success" ] || [ -z "$REVIEW_JSON" ]; then
            echo "::error::Review step outcome='$REVIEW_OUTCOME' produced no usable structured_output — failing closed (not a pass-by-default)."
            exit 1
          fi
          SEVERITY=$(echo "$REVIEW_JSON" | jq -r '.max_severity // "NONE"')
          VERDICT=$(echo "$REVIEW_JSON" | jq -r '.verdict // "approve"')
          echo "max_severity=$SEVERITY verdict=$VERDICT"
          if [ "$SEVERITY" = "HIGH" ] || [ "$SEVERITY" = "CRITICAL" ] || [ "$VERDICT" = "block" ]; then
            echo "::error::Review found $SEVERITY severity finding(s) (verdict=$VERDICT) — failing this check so it can be a required status blocking merge."
            exit 1
          fi
